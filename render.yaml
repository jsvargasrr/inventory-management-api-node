services:
  - type: web
    name: inventory-management-api
    runtime: node
    plan: free
    buildCommand: npm ci && npm run db:generate && npm run build
    startCommand: ./scripts/docker-entrypoint.sh
    healthCheckPath: /health
    envVars:
      - key: NODE_ENV
        value: production
      - key: DATABASE_URL
        fromDatabase:
          name: inventory-db
          property: connectionString

databases:
  - name: inventory-db
    plan: free
    databaseName: inventory
    user: inventory
